services:
  - type: web
    name: arogyamitra-backend
    runtime: python
    repo: https://github.com/pushkarwaghela/ArogyaMitra
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./arogyamitra.db
      - key: SECRET_KEY
        value: your-secret-key-here
      - key: GROQ_API_KEY
        value: gsk_TtxNadL85wk1vI87ZY2IWgdyb3FYDWKHb6yiX4mVQuOxQbzHgdx
      - key: YOUTUBE_API_KEY
        value: AIzaSyB3oAlHa3AaOT53c_doUxDoc5HSt4ivSOg
      - key: SPOONACULAR_API_KEY
        value: 88749fbcfbf345108b01c72995c03827
      - key: CORS_ORIGINS
        value: '["https://arogyamitra-frontend.vercel.app", "https://arogyamitra.vercel.app"]'
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False